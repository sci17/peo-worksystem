# Copy to C:\Users\Administrator\Desktop\peo-worksystem\secrets\godaddy.ini
# and replace with your real GoDaddy API credentials from developer.godaddy.com

dns_godaddy_key = REPLACE_WITH_GODADDY_API_KEY
dns_godaddy_secret = REPLACE_WITH_GODADDY_API_SECRET
