services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DJANGO_DB_NAME:-peo_database}
      MYSQL_USER: ${DJANGO_DB_USER:-django_user}
      MYSQL_PASSWORD: ${DJANGO_DB_PASSWORD:-django_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    volumes:
      - mysql_data:/var/lib/mysql
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD:-rootpass} || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  web:
    image: peo-worksystem-web:latest
    command: daphne -b 0.0.0.0 -p 8000 my_site.asgi:application
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "peopalawan.com,www.peopalawan.com"
      DJANGO_CSRF_TRUSTED_ORIGINS: "https://peopalawan.com,https://www.peopalawan.com"
      DJANGO_DB_ENGINE: "django.db.backends.mysql"
      DJANGO_DB_NAME: ${DJANGO_DB_NAME:-peo_database}
      DJANGO_DB_USER: ${DJANGO_DB_USER:-django_user}
      DJANGO_DB_PASSWORD: ${DJANGO_DB_PASSWORD:-django_pass}
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: "3306"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-this-to-a-long-random-secret}
      DJANGO_SECURE_PROXY_SSL_HEADER: "HTTP_X_FORWARDED_PROTO:https"
      DJANGO_USE_X_FORWARDED_HOST: "True"
      DJANGO_SECURE_SSL_REDIRECT: "False"
      DJANGO_SESSION_COOKIE_SECURE: "False"
      DJANGO_CSRF_COOKIE_SECURE: "False"
      DJANGO_SECURE_HSTS_SECONDS: "0"
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
      DJANGO_SECURE_HSTS_PRELOAD: "True"
      DJANGO_MEDIA_URL: /media/
      DJANGO_MEDIA_ROOT: /shared/media
      RUN_MIGRATIONS: "true"
      COLLECT_STATIC: "true"
    volumes:
      - shared_media:/shared/media
      - django_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s

volumes:
  mysql_data:
    driver: local
  shared_media:
    driver: local
  django_static:
    driver: local
