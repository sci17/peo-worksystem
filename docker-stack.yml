version: '3.9'

services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DJANGO_DB_NAME:-peo_database}
      MYSQL_USER: ${DJANGO_DB_USER:-django_user}
      MYSQL_PASSWORD: ${DJANGO_DB_PASSWORD:-django_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    volumes:
      - mysql_data:/var/lib/mysql
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD:-rootpass} || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  web:
    image: peo-worksystem-web:latest
    command: sh -c "python manage.py migrate && gunicorn my_site.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,[::1],your-domain.com"
      DJANGO_DB_ENGINE: "django.db.backends.mysql"
      DJANGO_DB_NAME: ${DJANGO_DB_NAME:-peo_database}
      DJANGO_DB_USER: ${DJANGO_DB_USER:-django_user}
      DJANGO_DB_PASSWORD: ${DJANGO_DB_PASSWORD:-django_pass}
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: "3306"
    volumes:
      - django_media:/app/media
      - django_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s

volumes:
  mysql_data:
    driver: local
  django_media:
    driver: local
  django_static:
    driver: local
