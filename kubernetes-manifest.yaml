apiVersion: v1
kind: Namespace
metadata:
  name: peo-worksystem

---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: peo-worksystem
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: rootpass
  MYSQL_DATABASE: peo_database
  MYSQL_USER: django_user
  MYSQL_PASSWORD: django_pass

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data-pvc
  namespace: peo-worksystem
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: peo-worksystem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.4
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: MYSQL_ROOT_PASSWORD
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: MYSQL_DATABASE
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: MYSQL_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: MYSQL_PASSWORD
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - "127.0.0.1"
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - "127.0.0.1"
          initialDelaySeconds: 20
          periodSeconds: 5
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-data
        persistentVolumeClaim:
          claimName: mysql-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: peo-worksystem
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: peo-worksystem-web
  namespace: peo-worksystem
spec:
  replicas: 2
  selector:
    matchLabels:
      app: peo-worksystem-web
  template:
    metadata:
      labels:
        app: peo-worksystem-web
    spec:
      containers:
      - name: web
        image: peo-worksystem-web:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DJANGO_DEBUG
          value: "False"
        - name: DJANGO_ALLOWED_HOSTS
          value: "peopalawan.com,www.peopalawan.com"
        - name: DJANGO_CSRF_TRUSTED_ORIGINS
          value: "https://peopalawan.com,https://www.peopalawan.com"
        - name: DJANGO_SECURE_PROXY_SSL_HEADER
          value: "HTTP_X_FORWARDED_PROTO:https"
        - name: DJANGO_USE_X_FORWARDED_HOST
          value: "True"
        - name: DJANGO_SECURE_SSL_REDIRECT
          value: "True"
        - name: DJANGO_SESSION_COOKIE_SECURE
          value: "True"
        - name: DJANGO_CSRF_COOKIE_SECURE
          value: "True"
        - name: DJANGO_SECURE_HSTS_SECONDS
          value: "31536000"
        - name: DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS
          value: "True"
        - name: DJANGO_SECURE_HSTS_PRELOAD
          value: "True"
        - name: DJANGO_DB_ENGINE
          value: "django.db.backends.mysql"
        - name: DJANGO_DB_NAME
          value: "peo_database"
        - name: DJANGO_DB_USER
          value: "django_user"
        - name: DJANGO_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: MYSQL_PASSWORD
        - name: DJANGO_DB_HOST
          value: "mysql"
        - name: DJANGO_DB_PORT
          value: "3306"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /admin/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /admin/
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: peo-worksystem-web
  namespace: peo-worksystem
spec:
  selector:
    app: peo-worksystem-web
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: peo-worksystem-nginx-config
  namespace: peo-worksystem
data:
  default.conf: |
    server {
        listen 80;
        server_name peopalawan.com www.peopalawan.com;
        client_max_body_size 250M;

        location /healthz {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://peo-worksystem-web:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: peo-worksystem-nginx
  namespace: peo-worksystem
spec:
  replicas: 2
  selector:
    matchLabels:
      app: peo-worksystem-nginx
  template:
    metadata:
      labels:
        app: peo-worksystem-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: nginx-config
        configMap:
          name: peo-worksystem-nginx-config

---
apiVersion: v1
kind: Service
metadata:
  name: peo-worksystem-nginx
  namespace: peo-worksystem
spec:
  selector:
    app: peo-worksystem-nginx
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: peo-worksystem-ingress
  namespace: peo-worksystem
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "250m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - peopalawan.com
    - www.peopalawan.com
    secretName: peopalawan-tls
  rules:
  - host: peopalawan.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: peo-worksystem-nginx
            port:
              number: 80
  - host: www.peopalawan.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: peo-worksystem-nginx
            port:
              number: 80
