apiVersion: v1
kind: Namespace
metadata:
  name: peo-worksystem

---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: peo-worksystem
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: rootpass
  MYSQL_DATABASE: peo_database
  MYSQL_USER: django_user
  MYSQL_PASSWORD: django_pass

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data-pvc
  namespace: peo-worksystem
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: peo-worksystem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.4
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: MYSQL_ROOT_PASSWORD
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: MYSQL_DATABASE
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: MYSQL_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: MYSQL_PASSWORD
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - "127.0.0.1"
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - "127.0.0.1"
          initialDelaySeconds: 20
          periodSeconds: 5
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-data
        persistentVolumeClaim:
          claimName: mysql-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: peo-worksystem
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: peo-worksystem-web
  namespace: peo-worksystem
spec:
  replicas: 2
  selector:
    matchLabels:
      app: peo-worksystem-web
  template:
    metadata:
      labels:
        app: peo-worksystem-web
    spec:
      containers:
      - name: web
        image: peo-worksystem-web:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DJANGO_DEBUG
          value: "False"
        - name: DJANGO_ALLOWED_HOSTS
          value: "localhost,127.0.0.1,[::1],192.168.1.177,peo.gov.com"
        - name: DJANGO_CSRF_TRUSTED_ORIGINS
          value: "http://192.168.1.177:8000"
        - name: DJANGO_DB_ENGINE
          value: "django.db.backends.mysql"
        - name: DJANGO_DB_NAME
          value: "peo_database"
        - name: DJANGO_DB_USER
          value: "django_user"
        - name: DJANGO_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: MYSQL_PASSWORD
        - name: DJANGO_DB_HOST
          value: "mysql"
        - name: DJANGO_DB_PORT
          value: "3306"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /admin/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /admin/
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: peo-worksystem-web
  namespace: peo-worksystem
spec:
  selector:
    app: peo-worksystem-web
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer
