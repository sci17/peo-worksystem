apiVersion: apps/v1
kind: Deployment
metadata:
    name: web
    namespace: peo-worksystem
    labels:
        com.docker.compose.project: peo-worksystem
        com.docker.compose.service: web
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: peo-worksystem
            com.docker.compose.service: web
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: peo-worksystem
                com.docker.compose.service: web
                com.docker.compose.network.default: "true"
        spec:
            restartPolicy: unless-stopped
            containers:
                - name: web
                  image: peo-worksystem-web
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: DJANGO_ALLOWED_HOSTS
                      value: "localhost,127.0.0.1,[::1]"
                    - name: DJANGO_CACHE_BACKEND
                      value: "django.core.cache.backends.filebased.FileBasedCache"
                    - name: DJANGO_CACHE_LOCATION
