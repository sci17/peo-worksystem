                      value: "True"
                  ports:
                    - name: web-8000
                      containerPort: 8000
                  volumeMounts:
                    - name: app
                      mountPath: /app
                    - name: app--cache-django
                      mountPath: /app/.cache/django
                    - name: app-media
                      mountPath: /app/media
                    - name: app-staticfiles
                      mountPath: /app/staticfiles
            volumes:
                - name: app
                  hostPath:
                    path: C:\Users\Administrator\Desktop\peo-worksystem
                - name: app--cache-django
                  persistentVolumeClaim:
                    claimName: web-django-cache
                - name: app-media
                  persistentVolumeClaim:
                    claimName: web-django-media
                - name: app-staticfiles
                  persistentVolumeClaim:
                    claimName: web-django-static
