services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 512m
    restart: unless-stopped
    command: redis-server --appendonly yes

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: daphne -b 0.0.0.0 -p 8000 my_site.asgi:application
    expose:
      - "8000"
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-peopalawan.com,www.peopalawan.com,localhost,127.0.0.1,[::1]}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000,https://peopalawan.com,https://www.peopalawan.com}
      DJANGO_DB_ENGINE: ${DJANGO_DB_ENGINE:-django.db.backends.mysql}
      DJANGO_DB_NAME: ${DJANGO_DB_NAME:-peo_database}
      DJANGO_DB_USER: ${DJANGO_DB_USER:-django_user}
      DJANGO_DB_PASSWORD: ${DJANGO_DB_PASSWORD:-django_pass}
      DJANGO_DB_HOST: ${DJANGO_DB_HOST:-db}
      DJANGO_DB_PORT: ${DJANGO_DB_PORT:-3306}
      DJANGO_CACHE_BACKEND: ${DJANGO_CACHE_BACKEND:-django_redis.cache.RedisCache}
      DJANGO_CACHE_LOCATION: ${DJANGO_CACHE_LOCATION:-redis://redis:6379/1}
      DJANGO_CHANNEL_LAYER_URL: ${DJANGO_CHANNEL_LAYER_URL:-redis://redis:6379/0}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-this-to-a-long-random-secret}
      DJANGO_SECURE_PROXY_SSL_HEADER: ${DJANGO_SECURE_PROXY_SSL_HEADER:-HTTP_X_FORWARDED_PROTO:https}
      DJANGO_USE_X_FORWARDED_HOST: ${DJANGO_USE_X_FORWARDED_HOST:-True}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-False}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE:-False}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE:-False}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-0}
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: ${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS:-True}
      DJANGO_SECURE_HSTS_PRELOAD: ${DJANGO_SECURE_HSTS_PRELOAD:-True}
      DJANGO_MEDIA_URL: /media/
      DJANGO_MEDIA_ROOT: /shared/media
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - .:/app
      - shared_media:/shared/media
      - django_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python manage.py check >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    mem_limit: 1g
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - shared_media:/shared/media:ro
      - django_static:/app/staticfiles:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    restart: unless-stopped

  db:
    image: mysql:8.4
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD:-rootpass} || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s
    environment:
      MYSQL_DATABASE: ${DJANGO_DB_NAME:-peo_database}
      MYSQL_USER: ${DJANGO_DB_USER:-django_user}
      MYSQL_PASSWORD: ${DJANGO_DB_PASSWORD:-django_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    volumes:
      - mysql_data:/var/lib/mysql
    mem_limit: 1g
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  shared_media:
    driver: local
  django_static:
    driver: local
  redis_data:
    driver: local
